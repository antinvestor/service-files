version: v2
name: buf.build/antinvestor/redirect
deps:
  - buf.build/bufbuild/protovalidate
lint:
  use:
    - STANDARD
  except:
    - FIELD_NOT_REQUIRED
    - PACKAGE_NO_IMPORT_CYCLE
    # Historical layout: proto file lives at redirect/redirect/v1/ but
    # declares package redirect.v1. Moving the file would break every
    # existing import path in the antinvestor/apis generated code.
    - PACKAGE_DIRECTORY_MATCH
breaking:
  use:
    - FILE
  except:
    - EXTENSION_NO_DELETE
    - FIELD_SAME_DEFAULT
    - FILE_NO_DELETE
