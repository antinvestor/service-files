      description: "Generates a thumbnail with specified dimensions and method. Supports static and animated thumbnails."
      tags: "Media"
    };
  }

  // GetUrlPreview gets OpenGraph preview data.
  rpc GetUrlPreview(GetUrlPreviewRequest) returns (GetUrlPreviewResponse) {
