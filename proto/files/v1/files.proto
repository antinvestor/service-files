      permissions: ["content_manage"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "setRetentionPolicy"
      summary: "Set retention policy"
      description: "Applies a retention policy to a media object."
      tags: "Retention"
    };
  }

  // GetRetentionPolicy gets retention for media.
  rpc GetRetentionPolicy(GetRetentionPolicyRequest) returns (GetRetentionPolicyResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "getRetentionPolicy"
      summary: "Get retention policy"
      description: "Gets the retention policy applied to a media object."
      tags: "Retention"
    };
  }

  // ListRetentionPolicies lists available policies.
  rpc ListRetentionPolicies(ListRetentionPoliciesRequest) returns (ListRetentionPoliciesResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "listRetentionPolicies"
      summary: "List retention policies"
      description: "Lists all available retention policies with pagination."
      tags: "Retention"
    };
  }

  // =================================================================
  // Analytics
  // =================================================================

  // GetUserUsage gets usage for a user.
  rpc GetUserUsage(GetUserUsageRequest) returns (GetUserUsageResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "getUserUsage"
      summary: "Get user usage"
      description: "Retrieves storage usage statistics for a user."
      tags: "Analytics"
    };
  }

  // GetStorageStats gets global storage stats.
  rpc GetStorageStats(GetStorageStatsRequest) returns (GetStorageStatsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "getStorageStats"
      summary: "Get storage statistics"
      description: "Retrieves global storage statistics."
      tags: "Analytics"
    };
  }
}
