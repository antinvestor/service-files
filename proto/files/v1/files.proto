      description: "Streams content from the repository for large files or memory efficiency."
      tags: "Media"
    };
  }

  // DownloadContentRange streams a byte range.
  rpc DownloadContentRange(DownloadContentRangeRequest) returns (stream DownloadContentRangeResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "downloadContentRange"
      summary: "Download content range"
      description: "Streams a specific byte range of content, useful for resume or partial download."
      tags: "Media"
    };
  }

  // =================================================================
  // Thumbnail & Preview
  // =================================================================

  // GetContentThumbnail generates a thumbnail.
  rpc GetContentThumbnail(GetContentThumbnailRequest) returns (GetContentThumbnailResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "getContentThumbnail"
