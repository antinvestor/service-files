  // =================================================================

  // GetConfig returns server configuration.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "getConfig"
      summary: "Get server configuration"
      description: "Retrieves server configuration including limits and capabilities."
      tags: "Media"
    };
  }

  // SearchMedia searches for media.
  rpc SearchMedia(SearchMediaRequest) returns (SearchMediaResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
      permissions: ["content_view"]
    };
    option (gnostic.openapi.v3.operation) = {
      operation_id: "searchMedia"
      summary: "Search media files"
      description: "Searches for media matching specified criteria with pagination support. Uses common.SearchRequest for standard pagination."
      tags: "Media"
    };
  }

  // =================================================================
  // Batch Operations
  // =================================================================

  // BatchGetContent retrieves multiple files.
  rpc BatchGetContent(BatchGetContentRequest) returns (BatchGetContentResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (common.v1.method_permissions) = {
