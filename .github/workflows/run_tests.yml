name: Run Tests

on:
  push:
  pull_request:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout new code for testing
        uses: actions/checkout@v6
      - name: Setup go testing infrastructure
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests (stable mode with single retry)
        shell: bash
        run: |
          set -o pipefail
          status=1
          for attempt in 1 2; do
            echo "Starting go test attempt ${attempt}/2"
            go test -count=1 -p 1 -timeout=45m ./...
            status=$?
            if [ "$status" -eq 0 ]; then
              echo "Tests passed on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -lt 2 ]; then
              echo "Tests failed on attempt ${attempt}, retrying once..."
              sleep 5
            fi
          done
          exit "$status"
