        parts:
          type: array
          items:
            $ref: '#/components/schemas/files.v1.ListMultipartPartsResponse.Part'
          title: parts
        nextCursor:
          title: next_cursor
          description: |-
            Pagination cursor for next page.
             Use in next request's PageCursor.page.
          $ref: '#/components/schemas/common.v1.PageCursor'
      title: ListMultipartPartsResponse
      additionalProperties: false
    files.v1.ListMultipartPartsResponse.Part:
      type: object
      properties:
        partNumber:
          type: integer
          title: part_number
          format: int32
        etag:
          type: string
          title: etag
        size:
