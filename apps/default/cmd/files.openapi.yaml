          $ref: '#/components/schemas/files.v1.AccessRole'
        cursor:
          title: cursor
          description: Pagination using common PageCursor.
          $ref: '#/components/schemas/common.v1.PageCursor'
      title: ListAccessRequest
      additionalProperties: false
    files.v1.ListAccessResponse:
      type: object
      properties:
        grants:
          type: array
          items:
            $ref: '#/components/schemas/files.v1.AccessGrant'
          title: grants
          description: Access grants for this media.
        nextCursor:
          title: next_cursor
          description: Pagination cursor for next page.
          $ref: '#/components/schemas/common.v1.PageCursor'
      title: ListAccessResponse
      additionalProperties: false
    files.v1.ListMultipartPartsRequest:
      type: object
      properties:
        uploadId:
          type: string
          title: upload_id
          description: Upload ID to list parts for.
        cursor:
          title: cursor
