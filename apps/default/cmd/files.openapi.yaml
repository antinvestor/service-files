          title: latest_version
          format: int64
          description: Latest version number.
        nextCursor:
          title: next_cursor
          description: Pagination cursor for next page.
          $ref: '#/components/schemas/common.v1.PageCursor'
      title: GetVersionsResponse
      additionalProperties: false
    files.v1.GrantAccessRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          description: Media ID to grant access to.
        grant:
          title: grant
          description: The access grant to apply.
          $ref: '#/components/schemas/files.v1.AccessGrant'
        idempotencyKey:
          type: string
          title: idempotency_key
          description: Idempotency key.
      title: GrantAccessRequest
      additionalProperties: false
      description: |-
        GrantAccessRequest grants access to a principal for media.

         Who can grant:
           - OWNER: can grant any role
           - WRITER: can grant READER only

         Duplicate grants:
           Granting to principal with existing role updates their role.
           No error returned; grant is simply updated.
    files.v1.GrantAccessResponse:
      type: object
      properties:
        success:
          type: boolean
          title: success
          description: Whether the grant was applied.
      title: GrantAccessResponse
      additionalProperties: false
    files.v1.HeadContentRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          maxLength: 40
          minLength: 1
          pattern: '[0-9a-z_-]{3,40}'
          description: Media ID to get metadata for.
      title: HeadContentRequest
      additionalProperties: false
      description: |-
        HeadContentRequest retrieves metadata without downloading content.

         Use for:
           - Checking if content exists
           - Getting metadata before download
           - Checking content length for range requests
           - Verifying etag for cache validation
    files.v1.HeadContentResponse:
      type: object
      properties:
        metadata:
          title: metadata
          description: Current metadata.
          $ref: '#/components/schemas/files.v1.MediaMetadata'
      title: HeadContentResponse
      additionalProperties: false
    files.v1.ListAccessRequest:
      type: object
      properties:
        mediaId:
          type: string
