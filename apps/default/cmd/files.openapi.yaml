components:
  schemas:
    base64:
      type: boolean
      title: base64
      description: Specifies if the message query param is base64 encoded, which may be required for binary data
    common.v1.PageCursor:
      type: object
      properties:
        limit:
          type: integer
          title: limit
          format: int32
          description: Number of items per cursor (limit)
        page:
          type: string
          title: page
          description: Page number/ cursor representing last id from result
      title: PageCursor
      additionalProperties: false
      description: |-
        PageCursor provides standard offset-based pagination/cursor stream parameters.
         Used for list operations that return large result sets.
    compression:
      title: compression
      enum:
        - identity
        - gzip
        - br
      description: Which compression algorithm to use for this request
    connect:
      title: connect
      enum:
        - v1
      description: Define the version of the Connect protocol
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    encoding:
      title: encoding
      enum:
        - proto
        - json
      description: Define which encoding or 'Message-Codec' to use
    files.v1.AbortMultipartUploadRequest:
      type: object
      properties:
        uploadId:
          type: string
          title: upload_id
          description: Upload ID to abort.
        idempotencyKey:
          type: string
          title: idempotency_key
          description: Idempotency key.
      title: AbortMultipartUploadRequest
      additionalProperties: false
    files.v1.AbortMultipartUploadResponse:
      type: object
      properties:
        aborted:
          type: boolean
          title: aborted
          description: |-
            Whether the abort was successful.
             False if upload already completed or not found.
      title: AbortMultipartUploadResponse
      additionalProperties: false
    files.v1.AccessGrant:
      type: object
      properties:
        principalId:
          type: string
          title: principal_id
          description: |-
            Principal ID receiving access.
             Format depends on principal_type:
               - User: "user:<user_id>" or just "<user_id>"
               - Service: "service:<service_name>"
               - Organization: "org:<org_id>" or "org:<org_id>/<unit>"
               - Chat Group: "room:<room_id>" or "chat:<chat_id>"
        principalType:
          title: principal_type
          description: |-
            Type of principal. Helps the system resolve membership correctly.
             If not specified, the server infers from principal_id format.
          $ref: '#/components/schemas/files.v1.PrincipalType'
        role:
          title: role
          description: |-
            Role to assign to the principal.
             See AccessRole for permission matrix.
          $ref: '#/components/schemas/files.v1.AccessRole'
        grantedAt:
          title: granted_at
          description: Timestamp when this grant was created.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        grantedBy:
          type: string
          title: granted_by
          description: |-
            ID of the principal who created this grant.
             Null if created by system (e.g., owner upload).
        expiresAt:
          title: expires_at
          description: |-
            Optional expiry for time-limited access.
             Null means permanent grant until manually revoked.
             Useful for temporary access sharing.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: AccessGrant
      additionalProperties: false
      description: |-
        AccessGrant represents a grant of access to a principal for media.

         Access grants are media-scoped. Each grant defines
         WHO (principal_id) gets WHAT role (role) for specific content.

         The principal type determines how membership is resolved:
           - USER: Direct user access
           - SERVICE: Service account access
           - ORGANIZATION: All members of the organization get access
           - CHAT_GROUP: All members of the chat group get access

         Ownership: The original uploader automatically receives OWNER role
         and cannot be revoked. This ensures content always has an owner.

         Best Practices:
           - Use service accounts for application access (WRITER role)
           - Use organizations/chat groups for team access management
           - Audit grants periodically for stale access
    files.v1.AccessRole:
      type: string
      title: AccessRole
      enum:
        - ACCESS_ROLE_UNSPECIFIED
        - ACCESS_ROLE_READER
        - ACCESS_ROLE_WRITER
        - ACCESS_ROLE_OWNER
      description: |-
        AccessRole defines the role granted to a principal for accessing media.

         Permission Matrix:
           | Operation          | READER | WRITER | OWNER |
           |-------------------|--------|--------|-------|
           | GetContent        |   Y    |   Y    |   Y   |
           | GetThumbnail      |   Y    |   Y    |   Y   |
           | PatchContent      |   N    |   Y    |   Y   |
           | DeleteContent     |   N    |   N    |   Y   |
           | GrantAccess       |   N    |   N    |   Y   |
           | RevokeAccess      |   N    |   N    |   Y   |
           | SetRetention      |   N    |   N    |   Y   |
           | RestoreVersion    |   N    |   Y    |   Y   |

         OWNER role also includes ability to transfer ownership to another
         principal and permanently delete (hard delete) content.
    files.v1.BatchDeleteContentRequest:
      type: object
      properties:
        mediaIds:
          type: array
          items:
            type: string
          title: media_ids
          maxItems: 100
          minItems: 1
          description: Media IDs to delete.
        hardDelete:
          type: boolean
          title: hard_delete
          description: True for hard delete, false for soft delete.
        idempotencyKey:
          type: string
          title: idempotency_key
          description: Idempotency key (applies to entire batch).
      title: BatchDeleteContentRequest
      additionalProperties: false
    files.v1.BatchDeleteContentResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/files.v1.BatchDeleteContentResponse.DeleteResult'
          title: results
      title: BatchDeleteContentResponse
      additionalProperties: false
    files.v1.BatchDeleteContentResponse.DeleteResult:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
        success:
          type: boolean
          title: success
        error:
          type: string
          title: error
      title: DeleteResult
      additionalProperties: false
    files.v1.BatchGetContentRequest:
      type: object
      properties:
        mediaIds:
          type: array
          items:
            type: string
          title: media_ids
          maxItems: 100
          minItems: 1
          description: Media IDs to retrieve.
      title: BatchGetContentRequest
      additionalProperties: false
      description: |-
        BatchGetContentRequest retrieves multiple files.

         Limits:
           - Maximum items per request determined by server config
           - Partial success supported (some items may fail)

         Performance:
           For large batches, use pagination or multiple requests.
    files.v1.BatchGetContentResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/files.v1.BatchGetContentResponse.ContentResult'
          title: results
      title: BatchGetContentResponse
      additionalProperties: false
    files.v1.BatchGetContentResponse.ContentResult:
      type: object
      allOf:
        - properties:
            mediaId:
              type: string
              title: media_id
        - oneOf:
            - type: object
              properties:
                content:
                  title: content
                  $ref: '#/components/schemas/files.v1.GetContentResponse'
              title: content
              required:
                - content
            - type: object
              properties:
                error:
                  type: string
                  title: error
              title: error
              required:
                - error
      title: ContentResult
      additionalProperties: false
    files.v1.CompleteMultipartUploadRequest:
      type: object
      properties:
        uploadId:
          type: string
          title: upload_id
          description: Upload ID from CreateMultipartUploadResponse.
        checksumSha256:
          type: string
          title: checksum_sha256
          description: |-
            SHA-256 checksum of the COMPLETE file (all parts combined).
             Required for integrity verification.
        parts:
          type: array
          items:
            $ref: '#/components/schemas/files.v1.CompleteMultipartUploadRequest.Part'
          title: parts
        idempotencyKey:
          type: string
          title: idempotency_key
          description: Idempotency key for completion.
      title: CompleteMultipartUploadRequest
      additionalProperties: false
    files.v1.CompleteMultipartUploadRequest.Part:
      type: object
      properties:
        partNumber:
          type: integer
          title: part_number
          format: int32
        etag:
          type: string
          title: etag
      title: Part
      additionalProperties: false
      description: |-
        Parts that make up the complete file.
         Must include all parts in order.
         Server verifies each part's etag matches.
    files.v1.CompleteMultipartUploadResponse:
      type: object
      properties:
        metadata:
          title: metadata
          description: Final metadata for the uploaded media.
          $ref: '#/components/schemas/files.v1.MediaMetadata'
      title: CompleteMultipartUploadResponse
      additionalProperties: false
    files.v1.CreateContentRequest:
      type: object
      properties:
        contentType:
          type: string
          title: content_type
          description: |-
            Expected MIME type of content to be uploaded.
             Helps with content-type detection validation.
        filename:
          type: string
          title: filename
          description: |-
            Expected filename for the content.
             Used for Content-Disposition header.
        visibility:
          title: visibility
          description: |-
            Initial visibility setting.
             Defaults to PRIVATE.
          $ref: '#/components/schemas/files.v1.MediaMetadata.Visibility'
        expiresAt:
          title: expires_at
          description: |-
            Optional expiration for the pre-created URI.
             If unused until this time, URI becomes invalid.
             Server enforces max expiration (e.g., 7 days).
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: User-defined labels for organization.
        accessorId:
          type: array
          items:
            type: string
          title: accessor_id
          description: Principals to grant initial READER access.
        organizationId:
          type: string
          title: organization_id
          description: |-
            Organization or group ID for metadata purposes.
             Optional - for organization/filtering, not access control.
        idempotencyKey:
          type: string
          title: idempotency_key
          description: |-
            Idempotency key for URI creation.
             Same key always returns same URI within TTL.
      title: CreateContentRequest
      additionalProperties: false
      description: |-
        CreateContentRequest creates a new content URI without uploading content.

         This reserves a URI that can be used later for actual upload.
         The URI remains reserved until content is uploaded or expires.

         Use Cases:
           1. Pre-allocation: Get URI before upload (e.g., for database records)
           2. Deferred upload: Get URI now, upload later
           3. Resumable: Store URI, allow client to resume interrupted upload

         Expiration:
           Unused URIs expire after configurable period (default: 24 hours).
           After expiration, the media_id is no longer valid for upload.
    files.v1.CreateContentRequest.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    files.v1.CreateContentResponse:
      type: object
      properties:
        contentUri:
          type: string
          title: content_uri
          description: |-
            Full content URI for future upload.
             Use server_name + media_id in UploadMetadata to upload.
        expiresAt:
          title: expires_at
          description: Timestamp when this URI expires if unused.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        mediaId:
          type: string
          title: media_id
          description: Media ID component of the URI.
        serverName:
          type: string
          title: server_name
          description: Server name component of the URI.
      title: CreateContentResponse
      additionalProperties: false
      description: CreateContentResponse contains the pre-created content URI.
    files.v1.CreateMultipartUploadRequest:
      type: object
      properties:
        filename:
          type: string
          title: filename
          description: Original filename for the final file.
        contentType:
          type: string
          title: content_type
          description: Expected MIME type.
        totalSize:
          type:
            - integer
            - string
          title: total_size
          format: int64
          description: |-
            Total size of the complete file in bytes.
             Used for progress tracking and validation.
        visibility:
          title: visibility
          description: Initial visibility.
          $ref: '#/components/schemas/files.v1.MediaMetadata.Visibility'
        expiresAt:
          title: expires_at
          description: Expiration timestamp for the media after upload completes.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: User-defined labels for organization.
        accessorId:
          type: array
          items:
            type: string
          title: accessor_id
          description: Principals to grant initial READER access.
        organizationId:
          type: string
          title: organization_id
          description: |-
            Organization or group ID for metadata purposes.
             Optional - for organization/filtering, not access control.
        idempotencyKey:
          type: string
          title: idempotency_key
          description: Idempotency key for the entire multipart operation.
      title: CreateMultipartUploadRequest
      additionalProperties: false
    files.v1.CreateMultipartUploadRequest.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    files.v1.CreateMultipartUploadResponse:
      type: object
      properties:
        uploadId:
          type: string
          title: upload_id
          description: |-
            Opaque upload ID for this multipart session.
             Required for all subsequent operations on this upload.
      title: CreateMultipartUploadResponse
      additionalProperties: false
    files.v1.DeleteContentRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          description: Media ID to delete.
        hardDelete:
          type: boolean
          title: hard_delete
          description: |-
            True for permanent deletion, false for soft delete.
             Default: false (soft delete)
        idempotencyKey:
          type: string
          title: idempotency_key
          description: Idempotency key.
      title: DeleteContentRequest
      additionalProperties: false
      description: |-
        DeleteContentRequest deletes content from the repository.

         Soft Delete (default):
           - Content marked as DELETED
           - Data retained for retention period
           - Can be restored via RestoreVersion
           - Storage not reclaimed until hard delete or expiration

         Hard Delete:
           - Content permanently removed
           - Cannot be restored
           - Storage reclaimed immediately
           - Requires OWNER role

         Retention Policy:
           If content is under retention policy, hard delete may be denied.
           Use DELETE_OUTCOME_DENIED_BY_RETENTION in response.
    files.v1.DeleteContentResponse:
      type: object
      properties:
        success:
          type: boolean
          title: success
          description: |-
            Whether the delete was successful.
             False if media not found or permission denied.
        outcome:
          title: outcome
          description: Detailed outcome of the delete operation.
          $ref: '#/components/schemas/files.v1.DeleteOutcome'
      title: DeleteContentResponse
      additionalProperties: false
    files.v1.DeleteOutcome:
      type: string
      title: DeleteOutcome
      enum:
        - DELETE_OUTCOME_UNSPECIFIED
        - DELETE_OUTCOME_SOFT
        - DELETE_OUTCOME_HARD
        - DELETE_OUTCOME_DENIED_BY_RETENTION
      description: |-
        DeleteOutcome represents the outcome of a delete operation.

         This field clarifies what happened during deletion, which is important
         for client logic and audit trails.
    files.v1.DownloadContentRangeRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          maxLength: 40
          minLength: 1
          pattern: '[0-9a-z_-]{3,40}'
          description: Media ID to download.
        start:
          type:
            - integer
            - string
          title: start
          format: int64
          description: |-
            Start byte offset (inclusive).
             Must be >= 0 and < file size.
        end:
          type:
            - integer
            - string
          title: end
          format: int64
          description: |-
            End byte offset (exclusive).
             Must be > start and <= file size.
             Omit or set to -1 for remainder of file.
      title: DownloadContentRangeRequest
      additionalProperties: false
    files.v1.DownloadContentRangeResponse:
      type: object
      properties:
        data:
          type: string
          title: data
          format: byte
          description: |-
            Chunk data.
             Chunk size varies based on server configuration.
      title: DownloadContentRangeResponse
      additionalProperties: false
      description: |-
        DownloadContentRangeResponse carries a portion of streamed range content.

         Server streams chunks as they're read from storage.
         Client assembles chunks in order received.
    files.v1.DownloadContentRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          maxLength: 40
          minLength: 1
          pattern: '[0-9a-z_-]{3,40}'
          description: Media ID to download.
      title: DownloadContentRequest
      additionalProperties: false
    files.v1.DownloadContentResponse:
      type: object
      properties:
        data:
          type: string
          title: data
          format: byte
          description: |-
            Chunk data.
             Chunk size varies based on server configuration.
      title: DownloadContentResponse
      additionalProperties: false
      description: |-
        DownloadContentResponse carries a portion of streamed content.

         Server streams chunks as they're read from storage.
         Client assembles chunks in order received.
    files.v1.FileVersion:
      type: object
      properties:
        version:
