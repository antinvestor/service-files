          title: checksum_sha256
          description: SHA-256 checksum of this version.
      title: FileVersion
      additionalProperties: false
      description: FileVersion represents a historical version of media.
    files.v1.FinalizeSignedUploadRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          description: Media ID to finalize.
        checksumSha256:
          type: string
          title: checksum_sha256
          description: |-
            SHA-256 checksum of the uploaded content.
             Must match what was actually uploaded.
        sizeBytes:
          type:
            - integer
            - string
          title: size_bytes
          format: int64
          description: |-
            Size of the uploaded content in bytes.
             Must match actual uploaded size.
        idempotencyKey:
          type: string
