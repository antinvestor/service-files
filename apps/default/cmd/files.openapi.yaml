          description: Media ID to get download URL for.
        expiresSeconds:
          type:
            - integer
            - string
          title: expires_seconds
          format: int64
          description: URL expiration in seconds.
        download:
          type: boolean
          title: download
          description: |-
            Optional: Force download (Content-Disposition: attachment).
             Default: false (inline for images, etc.)
        filename:
          type: string
          title: filename
          description: 'Optional: Override filename in Content-Disposition.'
      title: GetSignedDownloadUrlRequest
      additionalProperties: false
    files.v1.GetSignedDownloadUrlResponse:
      type: object
      properties:
        downloadUrl:
          type: string
          title: download_url
          description: Signed URL for direct download from storage.
      title: GetSignedDownloadUrlResponse
      additionalProperties: false
    files.v1.GetSignedUploadUrlRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          description: |-
            Media ID to get signed upload URL for.
             Media must be in CREATING state (from CreateContent).
        expiresSeconds:
          type:
            - integer
            - string
          title: expires_seconds
          format: int64
          description: |-
            URL expiration in seconds.
             Minimum: 60 (1 minute)
             Maximum: 3600 (1 hour) - configurable by admin
             Shorter = more secure
      title: GetSignedUploadUrlRequest
      additionalProperties: false
    files.v1.GetSignedUploadUrlResponse:
      type: object
      properties:
        uploadUrl:
          type: string
          title: upload_url
          description: |-
            Signed URL for direct upload to storage.
             HTTP PUT with binary content.
      title: GetSignedUploadUrlResponse
      additionalProperties: false
    files.v1.GetStorageStatsRequest:
