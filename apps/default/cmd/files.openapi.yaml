          $ref: '#/components/schemas/common.v1.PageCursor'
        timeoutMs:
          type:
            - integer
            - string
          title: timeout_ms
          format: int64
          description: Timeout in milliseconds.
      title: GetVersionsRequest
      additionalProperties: false
    files.v1.GetVersionsResponse:
      type: object
