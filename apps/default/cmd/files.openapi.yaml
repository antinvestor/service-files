          description: Idempotency key.
      title: FinalizeSignedUploadRequest
      additionalProperties: false
    files.v1.FinalizeSignedUploadResponse:
      type: object
      properties:
        metadata:
          title: metadata
          description: |-
            Final media metadata.
             State should now be AVAILABLE.
          $ref: '#/components/schemas/files.v1.MediaMetadata'
      title: FinalizeSignedUploadResponse
      additionalProperties: false
    files.v1.GetConfigRequest:
      type: object
      title: GetConfigRequest
      additionalProperties: false
      description: |-
        GetConfigRequest retrieves server configuration.

         This allows clients to discover server capabilities and limits
         without hardcoding values.
    files.v1.GetConfigResponse:
      type: object
      properties:
        maxUploadBytes:
          type:
            - integer
            - string
          title: max_upload_bytes
          format: int64
          description: |-
            Maximum upload size in bytes.
             Clients should enforce this before upload.
        directClientUploadEnabled:
          type: boolean
          title: direct_client_upload_enabled
          description: |-
            Whether direct client upload is enabled.
             If false, clients must use signed URLs.
        maxSignedUrlExpireSeconds:
          type:
            - integer
            - string
          title: max_signed_url_expire_seconds
          format: int64
          description: Maximum expiration time for signed URLs (seconds).
        minSignedUrlExpireSeconds:
          type:
            - integer
            - string
          title: min_signed_url_expire_seconds
          format: int64
          description: Minimum expiration time for signed URLs (seconds).
        supportedThumbnailMethods:
          type: array
          items:
            $ref: '#/components/schemas/files.v1.ThumbnailMethod'
          title: supported_thumbnail_methods
          description: Supported thumbnail methods.
        maxThumbnailWidth:
          type: integer
          title: max_thumbnail_width
          format: int32
          description: Maximum thumbnail dimensions.
        maxThumbnailHeight:
          type: integer
          title: max_thumbnail_height
          format: int32
        maxLabelsPerMedia:
          type: integer
          title: max_labels_per_media
          format: int32
          description: Maximum number of labels per media.
        maxLabelKeyLength:
          type: integer
          title: max_label_key_length
          format: int32
          description: Maximum label key length.
        maxLabelValueLength:
          type: integer
          title: max_label_value_length
          format: int32
          description: Maximum label value length.
        extra:
          title: extra
          description: Additional server configuration.
          $ref: '#/components/schemas/google.protobuf.Struct'
      title: GetConfigResponse
      additionalProperties: false
    files.v1.GetContentOverrideNameRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          maxLength: 40
          minLength: 1
          pattern: '[0-9a-z_-]{3,40}'
          description: Media ID to download.
        fileName:
          type: string
          title: file_name
          minLength: 1
          description: |-
            Filename to override in Content-Disposition header.
             Useful for API downloads where original name may be unsafe.
        timeoutMs:
          type:
            - integer
            - string
          title: timeout_ms
          format: int64
          description: Timeout in milliseconds.
      title: GetContentOverrideNameRequest
      additionalProperties: false
    files.v1.GetContentOverrideNameResponse:
      type: object
      properties:
        content:
          type: string
          title: content
          format: byte
        metadata:
          title: metadata
          $ref: '#/components/schemas/files.v1.MediaMetadata'
      title: GetContentOverrideNameResponse
      additionalProperties: false
    files.v1.GetContentRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          maxLength: 40
          minLength: 1
          pattern: '[0-9a-z_-]{3,40}'
          description: Media ID to download.
        timeoutMs:
          type:
            - integer
            - string
          title: timeout_ms
          format: int64
          description: |-
            Timeout in milliseconds.
             Default: 20000 (20 seconds)
             For very large files, use streaming API.
      title: GetContentRequest
      additionalProperties: false
      description: |-
        GetContentRequest downloads complete content.

         This is the standard download method for most use cases.
         For large files or streaming needs, use DownloadContent.

         Cache Headers:
           Server respects If-None-Match and If-Modified-Since.
           Include etag from metadata for efficient caching.

         Timeouts:
           Default: 20 seconds
           For large files, use DownloadContent (streaming).
    files.v1.GetContentResponse:
      type: object
      properties:
        content:
          type: string
          title: content
          format: byte
          description: Binary content of the file.
        metadata:
          title: metadata
          description: |-
            Current metadata at time of download.
             Always fetch fresh before using for decisions.
          $ref: '#/components/schemas/files.v1.MediaMetadata'
      title: GetContentResponse
      additionalProperties: false
    files.v1.GetContentThumbnailRequest:
      type: object
      properties:
        mediaId:
          type: string
          title: media_id
          maxLength: 40
          minLength: 1
          pattern: '[0-9a-z_-]{3,40}'
          description: Media ID to generate thumbnail from.
        width:
          exclusiveMinimum: 0
          type: integer
          title: width
          format: int32
          description: |-
            Desired width in pixels.
             Actual size may differ based on aspect ratio and method.
        height:
          exclusiveMinimum: 0
          type: integer
          title: height
          format: int32
          description: Desired height in pixels.
        method:
          title: method
          description: |-
            Resizing method.
             SCALE: fit within dimensions, preserve ratio
             CROP: exact dimensions, may lose edge content
          $ref: '#/components/schemas/files.v1.ThumbnailMethod'
        timeoutMs:
          type:
            - integer
            - string
          title: timeout_ms
          format: int64
          description: Timeout in milliseconds.
        animated:
          type: boolean
          title: animated
          description: |-
            Prefer animated thumbnail if available.
             Applies to GIF, WebP, video keyframes.
      title: GetContentThumbnailRequest
      additionalProperties: false
      description: |-
        GetContentThumbnailRequest generates a thumbnail from media.

         Requirements:
           - Media must be an image or video
           - For videos, keyframe extraction is used

         Animated Thumbnails:
           Set animated=true to prefer animated versions (GIF, WebP).
           Falls back to static if unavailable.

         Caching:
           Thumbnails are cached server-side.
           Same parameters return cached result.
    files.v1.GetContentThumbnailResponse:
      type: object
      properties:
        content:
          type: string
          title: content
          format: byte
          description: Thumbnail image data.
        metadata:
          title: metadata
          description: Metadata of the source media.
          $ref: '#/components/schemas/files.v1.MediaMetadata'
      title: GetContentThumbnailResponse
      additionalProperties: false
    files.v1.GetMultipartUploadRequest:
