openapi: 3.1.0
info:
  title: Files Management API
  description: Comprehensive file and media management API supporting upload, download, thumbnails, versioning, retention, and search. Files are identified via content URIs using HTTPS API paths (e.g. /v1/media/download/{serverName}/{mediaId}).
  contact:
    name: Ant Investor Ltd
    url: https://github.com/antinvestor/apis
    email: info@antinvestor.com
  license:
    name: Apache License
    url: https://github.com/antinvestor/apis/blob/master/LICENSE
  version: v1.0.0
x-service-namespace: service_files
x-service-permissions:
  - content_view
  - content_upload
  - content_manage
  - content_delete
  - file_access_view
  - file_access_manage
