          $ref: '#/components/schemas/google.protobuf.Timestamp'
        periodEnd:
          title: period_end
          description: End of the billing/usage period.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: GetUserUsageResponse
      additionalProperties: false
    files.v1.GetVersionsRequest:
